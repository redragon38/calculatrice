<html lang="fr"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice avec Historique Popup</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .calculator {
            width: 320px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
        }

        .display {
            padding: 20px;
            text-align: right;
            background: #2c3e50;
            color: white;
            font-size: 2.5em;
            height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            position: relative;
        }

        .history-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: orange;
            width: 15px;
            height: 15px;
            border-radius: 30%;
            cursor: pointer;
            font-size: 0.6em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .history-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .previous-operand {
            font-size: 0.6em;
            opacity: 0.7;
            height: 20px;
        }

        .current-operand {
            font-size: 1em;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1px;
            background: #ddd;
        }

        button {
            border: none;
            padding: 20px;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
        }

        button:hover {
            background: #f1f1f1;
        }

        .operator {
            background: #f39c12;
            color: white;
        }

        .operator:hover {
            background: #e67e22;
        }

        .scientific {
            background: #3498db;
            color: white;
        }

        .scientific:hover {
            background: #2980b9;
        }

        .equals {
            background: #2ecc71;
            color: white;
            grid-column: span 1;
        }

        .equals:hover {
            background: #27ae60;
        }

        .clear {
            background: #e74c3c;
            color: white;
        }

        .clear:hover {
            background: #c0392b;
        }

        .span-2 {
            grid-column: span 2;
        }

        .history-popup {
            position: absolute;
            top: 30px;
            right: 10px;
            background: black;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            width: 280px;
            max-height: 150px;
            overflow-y: auto;
            z-index: 10;
            display: none;
        }

        .history-popup.show {
            display: block;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #eee;
        }

        .history-title {
            margin: 0;
            font-size: 0.5em;
            color: #2c3e50;
        }

        .close-history {
            background: none;
            border: none;
            color: #7f8c8d;
            font-size: 0.5em;
            cursor: pointer;
        }

        .history-item {
            padding: 8px 0;
            border-bottom: 1px solid black;
            display: flex;
            justify-content: space-between;
        }

        .history-item:last-child {
            border-bottom: none;
        }

        .history-expression {
            color: #7f8c8d;
            font-size: 0.5em;
            flex: 1;
            text-align: left;
        }

        .history-result {
            margin-left: 10px;
            font-weight: bold;
            color: #2c3e50;
            margin-left: 10px;
            font-size: 0.5em;
        }

        .clear-history {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 4px 6px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
            width: 50%;
            font-size: 0.5em;
            float: right;
        }

        .clear-history:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <button class="history-btn" id="toggle-history">H</button>
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
            
            <div class="history-popup" id="history-popup">
                <div class="history-header">
                    <h3 class="history-title">Historique</h3>
                    <button class="close-history" id="close-history">×</button>
                </div>
                <div id="history-list"><div class="history-item">
                    <span class="history-expression">0²</span>
                    <span class="history-result">= 0</span>
                </div></div>
                <button class="clear-history" id="clear-history">Effacer l'historique</button>
            </div>
        </div>
        
        <div class="buttons">
            <button class="clear span-2" id="clear">AC</button>
            <button class="operator" id="delete">DEL</button>
            <button class="operator" id="divide">÷</button>
            <button class="scientific" id="sqrt">√</button>
            <button id="seven">7</button>
            <button id="eight">8</button>
            <button id="nine">9</button>
            <button class="operator" id="multiply">×</button>
            <button id="four">4</button>
            <button id="five">5</button>
            <button id="six">6</button>
            <button class="operator" id="subtract">-</button>
            <button id="one">1</button>
            <button id="two">2</button>
            <button id="three">3</button>
            <button class="operator" id="add">+</button>
            <button id="zero" class="span-2">0</button>
            <button id="decimal">.</button>
            <button class="equals" id="equals">=</button>
            <button class="scientific" id="square">x²</button>
            <button class="scientific" id="pi">π</button>
            <button class="scientific" id="percent">%</button>
        </div>
    </div>

    <script>
        let currentOperand = '0';
        let previousOperand = '';
        let operation = undefined;
        let resetScreen = false;
        let history = [];

        const currentOperandElement = document.getElementById('current-operand');
        const previousOperandElement = document.getElementById('previous-operand');
        const historyListElement = document.getElementById('history-list');
        const historyPopup = document.getElementById('history-popup');
        const toggleHistoryBtn = document.getElementById('toggle-history');
        const closeHistoryBtn = document.getElementById('close-history');
        const clearHistoryBtn = document.getElementById('clear-history');
        const numberButtons = document.querySelectorAll('[id^="one"],[id^="two"],[id^="three"],[id^="four"],[id^="five"],[id^="six"],[id^="seven"],[id^="eight"],[id^="nine"],[id^="zero"]');
        const operatorButtons = document.querySelectorAll('.operator:not(#delete):not(#clear)');
        const equalsButton = document.getElementById('equals');
        const clearButton = document.getElementById('clear');
        const deleteButton = document.getElementById('delete');
        const decimalButton = document.getElementById('decimal');
        const sqrtButton = document.getElementById('sqrt');
        const squareButton = document.getElementById('square');
        const piButton = document.getElementById('pi');
        const percentButton = document.getElementById('percent');

        function updateDisplay() {
            currentOperandElement.textContent = currentOperand;
            previousOperandElement.textContent = previousOperand;
        }

        function updateHistory() {
            historyListElement.innerHTML = '';
            history.forEach(item => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.innerHTML = `
                    <span class="history-expression">${item.expression}</span>
                    <span class="history-result">= ${item.result}</span>
                `;
                historyListElement.appendChild(historyItem);
            });
        }

        function addToHistory(expression, result) {
            history.unshift({ expression, result });
            if (history.length > 10) {
                history.pop();
            }
            updateHistory();
        }

        function toggleHistory() {
            historyPopup.classList.toggle('show');
        }

        function appendNumber(number) {
            if (currentOperand === '0' || resetScreen) {
                currentOperand = number;
                resetScreen = false;
            } else {
                currentOperand += number;
            }
            updateDisplay();
        }

        function insertPi() {
            if (currentOperand === '0' || resetScreen) {
                currentOperand = Math.PI.toString();
                resetScreen = false;
            } else {
                currentOperand += Math.PI.toString();
            }
            updateDisplay();
        }

        function calculatePercentage() {
            const current = parseFloat(currentOperand);
            if (isNaN(current)) return;

            const percentResult = current / 100;
            const expression = `${current}%`;

            addToHistory(expression, percentResult.toString());
            currentOperand = percentResult.toString();
            resetScreen = true;
            updateDisplay();
        }

        function chooseOperation(op) {
            if (currentOperand === '') return;
            if (previousOperand !== '') {
                compute();
            }
            operation = op;
            previousOperand = `${currentOperand} ${op}`;
            currentOperand = '';
            updateDisplay();
        }

        function compute() {
            let computation;
            const prev = parseFloat(previousOperand);
            const current = parseFloat(currentOperand);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+':
                    computation = prev + current;
                    break;
                case '-':
                    computation = prev - current;
                    break;
                case '×':
                    computation = prev * current;
                    break;
                case '÷':
                    computation = prev / current;
                    break;
                default:
                    return;
            }

            const fullExpression = `${previousOperand} ${currentOperand}`;
            addToHistory(fullExpression, computation.toString());

            currentOperand = computation.toString();
            operation = undefined;
            previousOperand = '';
            resetScreen = true;
            updateDisplay();
        }

        function computeSquareRoot() {
            const current = parseFloat(currentOperand);
            if (isNaN(current) || current < 0) {
                currentOperand = 'Error';
                updateDisplay();
                return;
            }
            
            const sqrtResult = Math.sqrt(current);
            const expression = `√(${current})`;
            
            addToHistory(expression, sqrtResult.toString());
            currentOperand = sqrtResult.toString();
            resetScreen = true;
            updateDisplay();
        }

        function computeSquare() {
            const current = parseFloat(currentOperand);
            if (isNaN(current)) return;

            const squareResult = current * current;
            const expression = `${current}²`;

            addToHistory(expression, squareResult.toString());
            currentOperand = squareResult.toString();
            resetScreen = true;
            updateDisplay();
        }

        function clear() {
            currentOperand = '0';
            previousOperand = '';
            operation = undefined;
            updateDisplay();
        }

        function deleteNumber() {
            if (currentOperand.length === 1 || (currentOperand.length === 2 && currentOperand.startsWith('-'))) {
                currentOperand = '0';
            } else {
                currentOperand = currentOperand.slice(0, -1);
            }
            updateDisplay();
        }

        function addDecimal() {
            if (resetScreen) {
                currentOperand = '0.';
                resetScreen = false;
                return;
            }
            if (currentOperand.includes('.')) return;
            currentOperand += '.';
            updateDisplay();
        }

        function clearHistory() {
            history = [];
            updateHistory();
        }

        // Event listeners
        numberButtons.forEach(button => {
            button.addEventListener('click', () => {
                appendNumber(button.textContent);
            });
        });

        operatorButtons.forEach(button => {
            button.addEventListener('click', () => {
                chooseOperation(button.textContent);
            });
        });

        equalsButton.addEventListener('click', compute);
        clearButton.addEventListener('click', clear);
        deleteButton.addEventListener('click', deleteNumber);
        decimalButton.addEventListener('click', addDecimal);
        sqrtButton.addEventListener('click', computeSquareRoot);
        squareButton.addEventListener('click', computeSquare);
        piButton.addEventListener('click', insertPi);
        percentButton.addEventListener('click', calculatePercentage);

        toggleHistoryBtn.addEventListener('click', toggleHistory);
        closeHistoryBtn.addEventListener('click', toggleHistory);
        clearHistoryBtn.addEventListener('click', clearHistory);

        // Close history when clicking outside
        document.addEventListener('click', (e) => {
            if (!historyPopup.contains(e.target) && e.target !== toggleHistoryBtn) {
                historyPopup.classList.remove('show');
            }
        });

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            else if (e.key === '.') addDecimal();
            else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                const op = e.key === '*' ? '×' : e.key === '/' ? '÷' : e.key;
                chooseOperation(op);
            }
            else if (e.key === 'Enter' || e.key === '=') compute();
            else if (e.key === 'Escape') clear();
            else if (e.key === 'Backspace') deleteNumber();
            else if (e.key === 'r' || e.key === 'R') computeSquareRoot();
            else if (e.key === 's' || e.key === 'S') computeSquare();
            else if (e.key === 'p' || e.key === 'P') insertPi();
            else if (e.key === '%') calculatePercentage();
        });
    </script>


</body></html>
